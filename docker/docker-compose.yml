version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
# GridPulse local stack:
#   - Redpanda: Kafka API compatible single-node broker (lighter than Kafka)
#   - Langfuse: LLM tracing UI (optional)
# ═══════════════════════════════════════════════════════════════════════════

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: gridpulse-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
    ports:
      - "19092:19092"   # Kafka protocol (use this from the host)
      - "18082:18082"   # Pandaproxy (HTTP REST)
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 3s
      retries: 5

  # Nice-to-have: Redpanda Console is a Kafka admin UI (browse topics etc.)
  console:
    image: redpandadata/console:v2.7.2
    container_name: gridpulse-redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
